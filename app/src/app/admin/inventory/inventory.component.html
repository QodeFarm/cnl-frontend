<div class="inventory-component container-fluid pt-3">

  <!-- Page Header -->
  <div class="inventory-banner">
    <div class="banner-left">
      <div class="banner-icon">
        <i class="fas fa-warehouse"></i>
      </div>
      <div class="banner-text">
        <span class="custom-heading">Inventory</span>
        <small class="banner-subtitle">View and manage stock, non-inventory, and service items</small>
      </div>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="inv-tabs-wrapper">
    <ul class="nav inv-tabs">
      <li class="nav-item">
        <a class="nav-link" [class.active]="selectedTabKey === 'inventory'" (click)="switchTab('inventory')">
          Inventory
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" [class.active]="selectedTabKey === 'nonInventory'" (click)="switchTab('nonInventory')">
          Non Inventory
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" [class.active]="selectedTabKey === 'services'" (click)="switchTab('services')">
          Service
        </a>
      </li>
    </ul>
  </div>

  <!-- Tab Content -->
  <div class="inv-tab-content">

    <!-- Loading -->
    <div *ngIf="loading" class="inv-loading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="alert alert-danger m-3">
      {{ error }}
    </div>

    <!-- Table -->
    <ng-container *ngIf="curdConfig && !loading && !error">
      <ta-curd-modal [options]="curdConfig" class="custom-list"></ta-curd-modal>
    </ng-container>

  </div>
</div>
