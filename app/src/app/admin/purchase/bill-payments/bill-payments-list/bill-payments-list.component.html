<ta-table [options]="tableConfig" class="custom-list">
    <div class="bottom-left" bottom-left>
        <div class="d-flex align-items-center gap-2">
            <button nz-button nz-dropdown [nzDropdownMenu]="mailMenu" nzType="default">
                <span nz-icon nzType="mail" nzTheme="outline"></span>
                Send Mail
                <span nz-icon nzType="down"></span>
            </button>
            <nz-dropdown-menu #mailMenu="nzDropdownMenu">
                <ul nz-menu>
                    <li nz-menu-item (click)="onMailLinkClick()">
                        <span nz-icon nzType="mail" nzTheme="outline"></span>&nbsp; Email
                    </li>
                    <li nz-menu-item (click)="onWhatsappClick()">
                        <span nz-icon nzType="message" nzTheme="outline"></span>&nbsp; WhatsApp
                    </li>
                </ul>
            </nz-dropdown-menu>
            <button nz-button nz-dropdown [nzDropdownMenu]="printMenu" nzType="primary">
                <span nz-icon nzType="printer" nzTheme="outline"></span>
                Print Document
                <span nz-icon nzType="down"></span>
            </button>
            <nz-dropdown-menu #printMenu="nzDropdownMenu">
                <ul nz-menu>
                    <li nz-menu-item (click)="onPreviewClick()">
                        <span nz-icon nzType="file-pdf" nzTheme="outline"></span>&nbsp; Preview
                    </li>
                    <li nz-menu-item (click)="onPrintClick()">
                        <span nz-icon nzType="printer" nzTheme="outline"></span>&nbsp; Print
                    </li>
                </ul>
            </nz-dropdown-menu>
        </div>
    </div>
</ta-table>

<div id="customDialog" class="custom-dialog-overlay" style="display: none;">
    <div class="custom-dialog-box">
    <p> ⚠️ Please select a Purchase Invoice </p>
    <button id="dialogOkButton" (click)="closeDialog()">OK</button>
    </div>
</div>

<!-- Rest of your template remains exactly the same -->
<div id="customToast" class="toast-message" *ngIf="showSuccessToast">
    <div class="tick-circle">
        <span class="tick-mark">✓</span>
    </div>
    <span class="toast-message-text">{{ toastMessage }}</span>
    <span class="toast-close" onclick="this.parentElement.style.display='none'">x</span>
</div>
