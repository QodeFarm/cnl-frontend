<div class="container-fluid p-3">
    <div class="assets-banner">
        <div class="col-12 px-0" style="display: flex; justify-content: space-between;align-items: center;">
            <div class="d-flex align-items-center" style="gap: 6px;">
              <button (click)="AssetsEditID = null" type="button" class="btn p-0" style="color: black;">
                <span *ngIf="AssetsEditID" class="custom-heading">Update Assets</span>
                <span *ngIf="!AssetsEditID" class="custom-heading">Create Assets</span>
              </button>
              <app-help-icon topic="assets-register"></app-help-icon>
            </div>
            <button (click)="showAssetsListFn()" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#assetsListModal">
                Assets List
            </button>
        </div>
    </div>
    <div class="row  custom-form">
        <div *ngIf="AssetsEditID && !showForm" class="col-12 p-3">
          <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 8 }"></nz-skeleton>
        </div>
        <div class="col-12 px-1" *ngIf="showForm">   <!--removed show form -->
            <ta-form [options]="formConfig"></ta-form>
        </div>
    </div>
</div>


<div class="modal fade custom-modal" id="assetsListModal" tabindex="-1" aria-labelledby="assetsListModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl ">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="assetsListModalLabel">Edit Assets List</h5>
                <button type="button" id="modalClose" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" *ngIf="showAssetsList">
                <app-assets-list (edit)="editAssets($event)" class="custom-list"></app-assets-list>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                <!-- <button type="button" class="btn btn-primary">Save changes</button> -->
            </div>
        </div>
    </div>
</div>
