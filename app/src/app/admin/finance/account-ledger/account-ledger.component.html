<div class="container-fluid p-2">
<div class="account-ledger-page">

  <!-- ── Compact summary strip ─────────────────────────────────────────────── -->
  <div class="al-summary-strip" *ngIf="showBalanceSummary">

    <span class="al-strip-badge">{{ accountTypeLabel }}</span>
    <span class="al-strip-name" [title]="accountName">{{ accountName }}</span>
    <span class="al-strip-sep"></span>

    <div class="al-strip-stat">
      <span class="al-stat-label">Opening</span>
      <span class="al-stat-value neutral">₹{{ openingBalance }}</span>
    </div>

    <div class="al-strip-stat">
      <span class="al-stat-label">Total Debit</span>
      <span class="al-stat-value"
        [class.dr]="totalDebit !== '0.00'"
        [class.neutral]="totalDebit === '0.00'">₹{{ totalDebit }}</span>
    </div>

    <div class="al-strip-stat">
      <span class="al-stat-label">Total Credit</span>
      <span class="al-stat-value"
        [class.cr]="totalCredit !== '0.00'"
        [class.neutral]="totalCredit === '0.00'">₹{{ totalCredit }}</span>
    </div>

    <div class="al-strip-stat closing">
      <span class="al-stat-label">Closing</span>
      <span class="al-stat-value"
        [class.dr]="isPositiveBalance"
        [class.cr]="!isPositiveBalance">
        ₹{{ absBalance }}
        <em [class.suffix-dr]="isPositiveBalance" [class.suffix-cr]="!isPositiveBalance">
          {{ isPositiveBalance ? 'Dr' : 'Cr' }}
        </em>
      </span>
    </div>

    <div class="al-strip-actions">
      <button nz-button nz-dropdown [nzDropdownMenu]="printMenu"
              class="al-print-btn" nzType="primary" nzSize="small">
        <span nz-icon nzType="printer" nzTheme="outline"></span>
        Print / Export
        <span nz-icon nzType="down"></span>
      </button>
      <nz-dropdown-menu #printMenu="nzDropdownMenu">
        <ul nz-menu>
          <li nz-menu-item (click)="onPreviewClick()">
            <span nz-icon nzType="file-pdf" nzTheme="outline"></span>&nbsp; Preview PDF
          </li>
          <li nz-menu-item (click)="onPrintClick()">
            <span nz-icon nzType="printer" nzTheme="outline"></span>&nbsp; Print
          </li>
        </ul>
      </nz-dropdown-menu>
    </div>

  </div>

  <!-- ── Ledger table ───────────────────────────────────────────────────────── -->
  <div class="ledger-table-wrapper">
    <ta-curd-modal [options]="curdConfig" class="custom-list"></ta-curd-modal>
  </div>

</div>
</div>
