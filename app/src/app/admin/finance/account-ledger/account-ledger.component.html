<div class="container-fluid p-3">
<div class="account-ledger-page">

  <!-- ── Account + Balance Summary Bar (shown once account is selected) ──── -->
  <div class="ledger-summary-bar" *ngIf="showBalanceSummary">

    <!-- Account identity -->
    <div class="ledger-identity">
      <span class="ledger-type-badge">{{ accountTypeLabel }}</span>
      <span class="ledger-account-name">{{ accountName }}</span>
    </div>

    <!-- Balance stats -->
    <div class="ledger-stats">
      <div class="ledger-stat stat-opening">
        <div class="stat-label">Opening Balance</div>
        <div class="stat-value neutral">₹{{ openingBalance }}</div>
      </div>
      <div class="ledger-stat stat-debit">
        <div class="stat-label">Total Debit</div>
        <div class="stat-value dr">₹{{ totalDebit }}</div>
      </div>
      <div class="ledger-stat stat-credit">
        <div class="stat-label">Total Credit</div>
        <div class="stat-value cr">₹{{ totalCredit }}</div>
      </div>
      <div class="ledger-stat stat-closing">
        <div class="stat-label">Closing Balance</div>
        <div class="stat-value closing" [class.cr]="isPositiveBalance" [class.dr]="!isPositiveBalance">
          ₹{{ finalBalance }}
          <span class="bal-suffix">{{ isPositiveBalance ? 'Dr' : 'Cr' }}</span>
        </div>
      </div>
    </div>

    <!-- Print / Export -->
    <div class="ledger-actions">
      <button nz-button nz-dropdown [nzDropdownMenu]="printMenu"
              class="ledger-print-btn" nzType="primary">
        <span nz-icon nzType="printer" nzTheme="outline"></span>
        Print / Export
        <span nz-icon nzType="down"></span>
      </button>
      <nz-dropdown-menu #printMenu="nzDropdownMenu">
        <ul nz-menu>
          <li nz-menu-item (click)="onPreviewClick()">
            <span nz-icon nzType="file-pdf" nzTheme="outline"></span>
            &nbsp; Preview PDF
          </li>
          <li nz-menu-item (click)="onPrintClick()">
            <span nz-icon nzType="printer" nzTheme="outline"></span>
            &nbsp; Print
          </li>
        </ul>
      </nz-dropdown-menu>
    </div>

  </div>

  <!-- ── Ledger Table (title comes from tableConfig, matches all other modules) -->
  <div class="ledger-table-wrapper">
    <ta-curd-modal [options]="curdConfig" class="custom-list"></ta-curd-modal>
  </div>

</div>
</div>
