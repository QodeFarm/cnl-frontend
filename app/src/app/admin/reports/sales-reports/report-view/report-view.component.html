<app-report-detail
  *ngIf="report"
  [report]="report">
</app-report-detail>

<div *ngIf="notFound" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:#8c8c8c;">
  <span nz-icon nzType="file-unknown" nzTheme="outline" style="font-size:48px;color:#d9d9d9;"></span>
  <p style="margin:0;font-size:14px;">Report not found. Please try again.</p>
</div>
