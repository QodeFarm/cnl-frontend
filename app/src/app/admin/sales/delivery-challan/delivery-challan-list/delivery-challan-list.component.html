<ta-table [options]="tableConfig" class="custom-list">
  <div class="bottom-left" bottom-left *ngIf="!isCustomerPortal">
    <div class="d-flex align-items-center">
      <button nz-button nz-dropdown [nzDropdownMenu]="printMenu" nzType="primary">
        <span nz-icon nzType="printer" nzTheme="outline"></span>
        Print Document
        <span nz-icon nzType="down"></span>
      </button>
      <nz-dropdown-menu #printMenu="nzDropdownMenu">
        <ul nz-menu>
          <li nz-menu-item (click)="showFormatDialog('preview')">
            <span nz-icon nzType="file-pdf" nzTheme="outline"></span>&nbsp; Preview
          </li>
          <li nz-menu-item (click)="showFormatDialog('print')">
            <span nz-icon nzType="printer" nzTheme="outline"></span>&nbsp; Print
          </li>
        </ul>
      </nz-dropdown-menu>
    </div>
  </div>
</ta-table>

<!-- Document Format Selection Dialog -->
<div id="dcFormatDialog" class="dc-format-dialog">
  <div class="dialog-content">
    <h5>Select Document Format</h5>
    <select [(ngModel)]="selectedFormat" class="form-select mb-3">
      <option value="CNL_Standard_Excl">CNL_Standard_Excl</option>
      <option value="CNL_Standard_Incl">CNL_Standard_Incl</option>
    </select>
    <div class="d-flex justify-content-end">
      <button class="btn btn-secondary me-2" (click)="closeFormatDialog()">Cancel</button>
      <button class="btn btn-primary" (click)="proceedWithSelectedAction()">Continue</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="dc-loading-overlay" *ngIf="showLoading">
  <div class="dc-loading-spinner"></div>
  <div class="dc-loading-text">Generating document...</div>
</div>

<!-- No Selection Dialog -->
<div id="dcNoSelectionDialog" class="dc-dialog-overlay" style="display: none;">
  <div class="dc-dialog-box">
    <p>⚠️ Please select a Delivery Challan</p>
    <button (click)="closeNoSelectionDialog()">OK</button>
  </div>
</div>

<!-- Error Toast -->
<div class="dc-toast-message" *ngIf="showSuccessToast">
  <span class="dc-toast-text">{{ toastMessage }}</span>
  <span class="dc-toast-close" (click)="showSuccessToast = false">✕</span>
</div>
