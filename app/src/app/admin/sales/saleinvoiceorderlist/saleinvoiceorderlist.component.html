<div class="orders-list-container">

  <!-- Empty state: no customer selected or no pending orders found -->
  <div *ngIf="noOrdersMessage; else orderTable" class="no-orders-empty-state">
    <span class="empty-icon">📋</span>
    <p class="empty-title">No Pending Orders</p>
    <p class="empty-sub">{{ noOrdersMessage }}</p>
  </div>

  <!-- Orders table -->
  <ng-template #orderTable>
    <ta-table
      *ngIf="selectedCustomerId"
      [options]="tableConfig"
      [customProductTemplate]="customProductTemplate">
    </ta-table>
  </ng-template>

  <ng-template #customProductTemplate let-row>
    <ng-container *ngIf="row.products && row.products.length > 0; else noProducts">
      <div class="product-checkList">
        <div *ngFor="let product of row.products; let i = index">
          <input
            type="checkbox"
            [(ngModel)]="product.checked"
            (change)="onProductCheckboxChange(row, product, $event)">
          {{ product.product_name }} (Qty: {{ product.quantity }})
        </div>
      </div>
    </ng-container>
    <ng-template #noProducts>No products available</ng-template>
  </ng-template>

  <div class="orders-list-footer">
    <button class="btn btn-primary" (click)="pullSelectedOrders()">Pull Selected Orders</button>
    <button class="btn btn-danger" (click)="closeModal()">Close</button>
  </div>

</div>
