<div class="container-fluid pt-3">
  <div class="row">
    <div class="col-12 px-2 py-1">
      <ta-curd-modal [options]="curdConfig" [customProductTemplate]="customProductTemplate"
        class="custom-list sale-receipt-table"></ta-curd-modal>
    </div>
  </div>
</div>

<!-- Define Custom Product Template for displaying product details without checkboxes -->
<ng-template #customProductTemplate let-row>
  <ng-container *ngIf="row.products && row.products.length > 0; else noProducts">
    <div *ngFor="let product of row.products" style="display: flex; align-items: center;">
      {{ product.product_name }} (Qty: {{ product.quantity }})
    </div>
  </ng-container>
  <ng-template #noProducts>No products available</ng-template>
</ng-template>


<!-- Confirmation Modal -->
<div *ngIf="showModal" class="custom-dialog-overlay">
  <div class="custom-dialog-box">
    <h5>Confirm Dispatch</h5>
    <p>Are you sure you want to confirm dispatch for the order {{ selectedOrder?.order_no }}?</p>
    <div class="dialog-actions">
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
      <button class="btn-confirm" (click)="confirmDispatch()">Confirm</button>
    </div>
  </div>
</div>

<!-- Notification Action Template -->
<ng-template #notificationActionTpl>
  <div style="display: flex; flex-direction: column; gap: 8px;">
    <span>Dispatch successful for <b>{{ dispatchedOrderContext?.order_no }}</b></span>
    <button (click)="navigateToInvoice()"
      style="background: #142768; color: #fff; border: none; border-radius: 4px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; align-self: flex-start; margin-top: 4px;">
      Create Sales Invoice
    </button>
  </div>
</ng-template>
