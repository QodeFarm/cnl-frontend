<!-- <ta-table [options]="tableConfig"> </ta-table> -->
<ta-table [options]="tableConfig">
    <div class="bottom-left" bottom-left>
        <div class="d-flex align-items-center gap-2">
            <button nz-button nz-dropdown [nzDropdownMenu]="mailMenu" nzType="default">
                <span nz-icon nzType="mail" nzTheme="outline"></span>
                Send Mail
                <span nz-icon nzType="down"></span>
            </button>
            <nz-dropdown-menu #mailMenu="nzDropdownMenu">
                <ul nz-menu>
                    <li nz-menu-item (click)="showFormatDialog('email')">
                        <span nz-icon nzType="mail" nzTheme="outline"></span>&nbsp; Email
                    </li>
                    <li nz-menu-item (click)="showFormatDialog('whatsapp')">
                        <span nz-icon nzType="message" nzTheme="outline"></span>&nbsp; WhatsApp
                    </li>
                </ul>
            </nz-dropdown-menu>
            <button nz-button nz-dropdown [nzDropdownMenu]="printMenu" nzType="primary">
                <span nz-icon nzType="printer" nzTheme="outline"></span>
                Print Document
                <span nz-icon nzType="down"></span>
            </button>
            <nz-dropdown-menu #printMenu="nzDropdownMenu">
                <ul nz-menu>
                    <li nz-menu-item (click)="showFormatDialog('preview')">
                        <span nz-icon nzType="file-pdf" nzTheme="outline"></span>&nbsp; Preview
                    </li>
                    <li nz-menu-item (click)="showFormatDialog('print')">
                        <span nz-icon nzType="printer" nzTheme="outline"></span>&nbsp; Print
                    </li>
                </ul>
            </nz-dropdown-menu>
        </div>
    </div>
</ta-table>

<!-- Document Format Selection Dialog -->
<div id="formatDialog" class="format-dialog">
    <div class="dialog-content">
        <h5>Select Document Format</h5>
        <select [(ngModel)]="selectedFormat" class="form-select mb-3">
        <option value="CNL_Standard_Excl">CNL_Standard_Excl</option>
        <option value="CNL_Standard_Incl">CNL_Standard_Incl</option>
        </select>
        <div class="d-flex justify-content-end">
        <button class="btn btn-secondary me-2" (click)="closeFormatDialog()">Cancel</button>
        <button class="btn btn-primary" (click)="proceedWithSelectedAction()">Continue</button>
        </div>
    </div>
</div>

<div id="customToast" class="toast-message" *ngIf="showSuccessToast">
    <div class="tick-circle">
        <span class="tick-mark">✓</span>
    </div>
    <span class="toast-message-text">{{ toastMessage }}</span>
    <span class="toast-close" onclick="this.parentElement.style.display='none'">x</span>
</div>

<!-- Loading Indicator -->
<div class="loading-overlay" *ngIf="showLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Generating preview...</div>
</div>

<div id="customDialog" class="custom-dialog-overlay" style="display: none;">
    <div class="custom-dialog-box">
    <p> ⚠️ Please select a Sale Invoice </p>
    <button id="dialogOkButton" (click)="closeDialog()">OK</button>
    </div>
</div>
