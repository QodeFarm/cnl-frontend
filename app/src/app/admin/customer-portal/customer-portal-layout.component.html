<div class="portal-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Logo Section - Matching targeted design -->
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-main">C&L</div>
        <div class="logo-sub">Customer Portal</div>
      </div>
    </div>

    <!-- User Profile Section (Hidden as per your code) -->
    <!-- <div class="user-profile">
      <div class="avatar">
        {{ customerInitials }}
      </div>
      <div class="user-info">
        <h4>{{ customerName }}</h4>
        <p>Customer Account</p>
      </div>
    </div> -->

    <!-- Navigation Menu - With proper spacing and labels -->
    <nav class="sidebar-nav">
      <ul class="nav-menu">
        <li class="nav-item" *ngFor="let item of menuItems">
          <a class="nav-link" [class.active]="item.active" (click)="navigate(item.path)">
            <div class="nav-icon">
              <i class="fas {{ item.icon }}"></i>
              <span class="badge" *ngIf="item.badge">{{ item.badge }}</span>
            </div>
            <div class="nav-label">{{ item.label }}</div>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <div class="time-display">
        <i class="fas fa-clock"></i>
        {{ currentTime }}
      </div>
      <button class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Header -->
    <header class="content-header">
      <div class="header-left">
        <button class="menu-toggle" (click)="toggleMobileMenu()">
          <i class="fas fa-bars"></i>
        </button>
        <h1>{{ pageTitle }}</h1>
      </div>
      <div class="header-right">
        <div class="notification-badge">
          <i class="fas fa-bell"></i>
          <span class="badge">3</span>
        </div>
        <div class="header-user">
          <span class="user-name">{{ customerName }}</span>
          <div class="avatar-small">{{ customerInitials }}</div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
