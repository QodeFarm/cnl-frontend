<!-- src/app/customer-portal/customer-forgot-password/customer-forgot-password.component.html -->

<div class="customer-forgot-password-container">
    <div class="container-fluid p-0 h-100">
        <div class="row m-0 login-block justify-content-center h-100">
            
            <!-- Left Side - Branding/Image -->
            <div class="login-left-block h-100">
                <img src="assets/img/login-logo.png" alt="C&L" />
            </div>
            
            <!-- Right Side - Forgot Password Form -->
            <div class="login-right-block h-100">
                <div class="login-form">
                    
                    <div class="logo-design-block mb-4">
                        <h1>C&L</h1>
                        <span>Accounts Book</span>
                    </div>
                    
                    <!-- Error Message -->
                    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        {{ errorMessage }}
                        <button type="button" class="btn-close" (click)="clearError()" aria-label="Close">×</button>
                    </div>
                    
                    <!-- Success State -->
                    <div *ngIf="isSubmitted" class="text-center">
                        <div class="success-icon mb-4">
                            <i class="fas fa-check-circle" style="font-size: 48px; color: #28a745;"></i>
                        </div>
                        <h3 style="font-size: 1.3rem; margin-bottom: 0.5rem;">Check Your Email</h3>
                        <p style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 1rem;">
                            We've sent a password reset link to your registered email address.
                        </p>
                        <div class="alert alert-info" style="font-size: 0.7rem; padding: 6px 10px;">
                            <i class="fas fa-envelope me-2"></i>
                            Didn't receive the email? 
                            <a href="javascript:void(0)" (click)="onSubmit()" class="alert-link">Click here to resend</a>
                        </div>
                        <button class="btn-primary mt-3" (click)="goToLogin()">
                            Back to Login
                        </button>
                    </div>
                    
                    <!-- Forgot Password Form -->
                    <div *ngIf="!isSubmitted">
                        <div class="text-center mb-4">
                            <h3 style="font-size: 1.3rem; margin-bottom: 0.5rem;">Forgot Password?</h3>
                            <p style="font-size: 0.8rem; opacity: 0.8;">
                                Enter your username to reset your password
                            </p>
                        </div>
                        
                        <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
                            <div class="form-group">
                                <i class="fas fa-user"></i>
                                <input type="text" 
                                       class="form-control-user" 
                                       [(ngModel)]="username"
                                       name="username"
                                       placeholder="Username"
                                       required>
                            </div>
                            
                            <div class="button-group text-center mt-4">
                                <button type="submit" 
                                        class="btn-primary" 
                                        [disabled]="isLoading || !forgotForm.form.valid">
                                    <span *ngIf="!isLoading">
                                        <i class="fas fa-envelope me-2"></i>
                                        Send Reset Link
                                    </span>
                                    <span *ngIf="isLoading">
                                        <i class="fas fa-spinner fa-spin me-2"></i>
                                        Sending...
                                    </span>
                                </button>
                            </div>
                        </form>
                        
                        <div class="forgot-password-link text-center mt-3">
                            <a href="javascript:void(0)" (click)="goToLogin()" class="forgot-link">
                                <i class="fas fa-arrow-left me-1"></i> Back to Login
                            </a>
                        </div>
                        
                        <div class="help-text text-center mt-3">
                            <small>
                                <i class="fas fa-headset me-1"></i>
                                Need help? <a href="mailto:support@yourdomain.com">Contact Support</a>
                            </small>
                        </div>
                    </div>
                    
                </div>
            </div>
            
        </div>
    </div>
</div>
