<div class="login-page">
    <div class="container-fluid p-0 h-100">
        <!-- Outer Row -->
        <div class="row m-0 login-block justify-content-center h-100">
            <div class="login-left-block h-100">
                <img src="assets/img/login-logo.png" />
            </div>
            <div class="login-right-block h-100">
                <div class="row m-0">
                    <div class="col-lg-12">
                        <div class="p-2 login-form">
                            <div class="logo-design-block mb-4">
                                <h1 class="">C&L</h1>
                                <!-- <span>Customer Account</span> -->
                                <div class="customer-account-text">Customer Self-Service Portal</div>
                            </div>
                            <div class="login-form-block">
                                <!-- Welcome Message (from email) -->
                                <div class="alert alert-info" *ngIf="message">
                                    <i class="fas fa-info-circle"></i>
                                    {{ message }}
                                </div>
                                
                                <!-- Error Message -->
                                <div class="alert alert-danger" *ngIf="errorMessage">
                                    <i class="fas fa-exclamation-circle"></i>
                                    {{ errorMessage }}
                                </div>
                                
                                <!-- Login Form -->
                                <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
                                    <div class="form-group position-relative mb-4">
                                        <i class="fas fa-fw fa-user"></i>
                                        <input 
                                            type="text" 
                                            class="form-control form-control-user" 
                                            id="username" 
                                            [(ngModel)]="username" 
                                            name="username"
                                            placeholder="user id / email"
                                            required>
                                    </div>
                                    <div class="form-group position-relative mb-4">
                                        <i class="fas fa-lock"></i>
                                        <input 
                                            type="password" 
                                            class="form-control form-control-user" 
                                            id="password" 
                                            [(ngModel)]="password" 
                                            name="password"
                                            placeholder="Password"
                                            required>
                                    </div>
                                    
                                    <!-- Button Group: Login and Reset side by side -->
                                    <div class="button-group">
                                        <button type="submit" class="btn-login" [disabled]="loading">
                                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                                            {{ loading ? 'Logging...' : 'Login' }}
                                        </button>
                                        <button type="button" class="btn-reset" (click)="resetForm()">
                                            Reset
                                        </button>
                                    </div>
                                    
                                    <!-- ython manage.py runserver Password Link -->
                                    <div class="forgot-password-link">
                                        <a class="forgot-link" (click)="forgotPassword()" href="javascript:void(0)">Forgot Password</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
