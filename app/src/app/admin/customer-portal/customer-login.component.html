<div class="customer-login-container">
  <div class="login-box">
    <!-- Header -->
    <div class="login-header">
      <img src="assets/img/logo.png" alt="Logo" class="logo">
      <h2>Customer Portal</h2>
      <p>Login to view your orders and account</p>
    </div>
    
    <!-- Welcome Message (from email) -->
    <div class="alert alert-info" *ngIf="message">
      <i class="fas fa-info-circle"></i>
      {{ message }}
    </div>
    
    <!-- Error Message -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      <i class="fas fa-exclamation-circle"></i>
      {{ errorMessage }}
    </div>
    
    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="username">
          <i class="fas fa-user"></i>
          Username or Email
        </label>
        <input 
          type="text" 
          id="username"
          class="form-control" 
          [(ngModel)]="username" 
          name="username"
          placeholder="Enter your username or email"
          required
          autofocus>
      </div>
      
      <div class="form-group">
        <label for="password">
          <i class="fas fa-lock"></i>
          Password
        </label>
        <input 
          type="password" 
          id="password"
          class="form-control" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Enter your password"
          required>
      </div>
      
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
          <span>Remember me</span>
        </label>
        <a href="javascript:void(0)" class="forgot-link" (click)="forgotPassword()">
          Forgot Password?
        </a>
      </div>
      
      <button 
        type="submit" 
        class="btn-login" 
        [disabled]="loading || !loginForm.form.valid">
        <span *ngIf="loading" class="spinner"></span>
        <i class="fas fa-sign-in-alt" *ngIf="!loading"></i>
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
    
    <!-- Footer -->
    <div class="login-footer">
      <p>
        <i class="fas fa-building"></i>
        C&L - Customer Portal
      </p>
      <p class="version">Version 2.0.0</p>
    </div>
  </div>
  
  <!-- Background decoration -->
  <div class="decoration-circle circle-1"></div>
  <div class="decoration-circle circle-2"></div>
</div>
