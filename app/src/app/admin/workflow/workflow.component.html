<div class="container-fluid p-3">
  <div class="workflow-banner">
    <div class="col-12 px-0 d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3" *ngIf="showWorkflowList">
      <div class="d-flex align-items-center" style="gap: 6px;">
        <h4 class="custom-heading mb-0">Workflow List</h4>
        <app-help-icon topic="workflow"></app-help-icon>
      </div>
      <button class="btn btn-primary" (click)="createWorkflow()">Create Workflow</button>
    </div>
  </div>

  <!-- Show list -->
  <app-workflow-list 
    *ngIf="showWorkflowList"
    (edit)="editWorkflow($event)">
  </app-workflow-list>

<!-- Show form only when editing -->
<div class="row custom-form">
  <div *ngIf="workflowEditID && !showForm" class="col-12 p-3">
    <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 8 }"></nz-skeleton>
  </div>
  <div class="p-0" *ngIf="showForm">

    <!-- Header with Back button aligned right -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center" style="gap: 6px;">
        <h4 class="custom-heading mb-0">{{ workflowEditID ? 'Edit Workflow' : 'Create Workflow' }}</h4>
        <app-help-icon topic="workflow"></app-help-icon>
      </div>
      <button class="btn btn-primary" (click)="backToList()">
        Back to List
      </button>
    </div>

    <!-- Actual form -->
    <ta-form [options]="formConfig"></ta-form>

  </div>
</div>

</div>
